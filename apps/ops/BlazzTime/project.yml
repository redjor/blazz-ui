name: BlazzTime
options:
  bundleIdPrefix: dev.blazz
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
settings:
  base:
    DEVELOPMENT_TEAM: P9KAWJ28LA
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "Apple Development"
targets:
  BlazzTime:
    type: application
    platform: macOS
    sources:
      - BlazzTime
      - Shared
    dependencies:
      - target: BlazzTimeWidget
    settings:
      base:
        INFOPLIST_FILE: BlazzTime/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: dev.blazz.blazztime
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: false
        MACOSX_DEPLOYMENT_TARGET: "14.0"
  BlazzTimeWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: BlazzTimeWidget
        excludes:
          - Info.plist
          - BlazzTimeWidget.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.blazz.blazztime.widget
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        INFOPLIST_FILE: BlazzTimeWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: BlazzTimeWidget/BlazzTimeWidget.entitlements
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
  BlazzTimeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - BlazzTimeTests
    dependencies:
      - target: BlazzTime
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: "YES"
